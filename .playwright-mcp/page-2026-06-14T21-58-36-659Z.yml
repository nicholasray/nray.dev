              - img "Screenshot of PageSpeed Insights report showing a passing Interaction to Next Paint under a \"Discover what your real users are experiencing\" section" [ref=e272]
            - generic [ref=e273]: A PageSpeed Insights report can show how real users are experiencing your website.
          - paragraph [ref=e274]: "When using this PageSpeeds Insights, you should be aware of the following:"
          - list [ref=e275]:
