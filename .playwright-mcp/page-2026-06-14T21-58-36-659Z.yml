          - paragraph [ref=e144]:
            - text: As a Core Web Vital, INP measures a critical aspect of a user's experience —
            - strong [ref=e145]: interactivity
            - text: and
            - strong [ref=e146]: responsiveness
            - text: . Google will use INP as a
            - link "page experience signal" [ref=e147] [cursor=pointer]:
              - /url: https://developers.google.com/search/docs/appearance/page-experience
              - strong [ref=e148]: page experience signal
            - text: that influences your website's search ranking.
          - figure "Google suggests that Core Web Vitals, which INP will become on March 2024, is a page experience signal that influences search ranking." [ref=e149]:
