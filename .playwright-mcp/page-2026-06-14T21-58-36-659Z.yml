          - heading "jump link What can happen during an interaction?" [level=2] [ref=e232]:
            - link "jump link" [ref=e233] [cursor=pointer]:
              - /url: "#what-can-happen-during-an-interaction"
              - text: "#"
            - text: What can happen during an interaction?
          - paragraph [ref=e234]:
            - text: INP contains
            - strong [ref=e235]: three critical phases
            - text: ":"
          - list [ref=e236]:
            - listitem [ref=e237]:
              - strong [ref=e238]: Input delay
              - text: ": Begins when a user clicks, taps, or presses a key and ends when the first JavaScript event callback starts executing"
            - listitem [ref=e239]:
              - strong [ref=e240]: Processing time
              - text: ": The total execution time of the event callbacks"
            - listitem [ref=e241]:
              - strong [ref=e242]: Presentation delay
              - text: ": Begins when the last event callback completes and ends when a visual update occurs"
          - figure "Each interaction consists of an input delay, processing time, and presentation delay element. Interaction latency is the sum of these three components." [ref=e243]:
            - link "Detailed interaction timeline consisting of blocking tasks (input delay), event callbacks like pointerup, mouseup, and click (processing time), and render, paint, and composite steps (presentation delay). At the end is a visual update." [ref=e244] [cursor=pointer]:
              - /url: /@fs/Users/nray/Development/nray.dev/src/blog/interaction-to-next-paint-inp-everything-you-need-to-know/_assets/interaction-to-next-paint-components.svg?origWidth=1706&origHeight=692&origFormat=svg
              - img "Detailed interaction timeline consisting of blocking tasks (input delay), event callbacks like pointerup, mouseup, and click (processing time), and render, paint, and composite steps (presentation delay). At the end is a visual update." [ref=e245]
            - generic [ref=e246]: Each interaction consists of an input delay, processing time, and presentation delay element. Interaction latency is the sum of these three components.
          - paragraph [ref=e247]: Each of these phases adds time to the latency of an interaction.
          - heading "jump link How to measure INP" [level=2] [ref=e248]:
            - link "jump link" [ref=e249] [cursor=pointer]:
              - /url: "#how-to-measure-inp"
              - text: "#"
            - text: How to measure INP
          - paragraph [ref=e250]:
            - text: Since INP requires interactions with the page, the best way to measure it is with real users through
            - strong [ref=e251]: Real User Monitoring (RUM)
            - text: . Usually, this involves adding a small piece of JavaScript to your website that tracks the responsiveness of each interaction on a page (PageSpeed Insights is a notable exception).
          - paragraph [ref=e252]: "You can use one of the following tools:"
          - list [ref=e253]:
            - listitem [ref=e254]:
              - link "PageSpeed Insights" [ref=e255] [cursor=pointer]:
                - /url: https://pagespeed.web.dev/
            - listitem [ref=e256]:
              - 'link "`web-vitals` JavaScript Library" [ref=e257] [cursor=pointer]':
