              - img "Interaction to Next Paint score diagram showing that 0 - 200 ms is good, 201 ms to 500 ms needs improvement, and greater than 500 ms is poor." [ref=e217]
          - heading "jump link What interactions does INP measure?" [level=2] [ref=e218]:
