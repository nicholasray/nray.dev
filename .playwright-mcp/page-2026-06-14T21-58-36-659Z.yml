          - heading "jump link What is the difference between First Input Delay (FID) and INP?" [level=2] [ref=e153]:
            - link "jump link" [ref=e154] [cursor=pointer]:
              - /url: "#what-is-the-difference-between-first-input-delay-fid-and-inp"
              - text: "#"
            - text: What is the difference between First Input Delay (FID) and INP?
          - paragraph [ref=e155]: "The INP metric is FID's successor, replacing it as a Core Web Vital on March 2024. Although both metrics measure a page's interactivity and responsiveness, INP provides a more comprehensive assessment of a user's experience in two important ways:"
          - list [ref=e156]:
            - listitem [ref=e157]:
              - text: INP observes
              - emphasis [ref=e158]: all
              - text: interactions throughout the lifetime of a page, while FID only measures the first interaction
            - listitem [ref=e159]: INP measures the time it takes from the start of the interaction to the moment the first frame appears, while FID only measures the time it takes for the browser to be able to respond to the interaction (input delay portion)
          - figure "FID only measures the input delay portion of an interaction, but INP measures the complete interaction." [ref=e160]:
            - link "An interaction timeline consisting of input delay, processing time, and presentation delay portions. First Input Delay only measures the input delay portion, but Interaction to Next Paint measures the complete interaction." [ref=e161] [cursor=pointer]:
              - /url: /@fs/Users/nray/Development/nray.dev/src/blog/interaction-to-next-paint-inp-everything-you-need-to-know/_assets/inp-vs-fid.svg?origWidth=1150&origHeight=465&origFormat=svg
              - img "An interaction timeline consisting of input delay, processing time, and presentation delay portions. First Input Delay only measures the input delay portion, but Interaction to Next Paint measures the complete interaction." [ref=e162]
            - generic [ref=e163]: FID only measures the input delay portion of an interaction, but INP measures the complete interaction.
          - paragraph [ref=e164]:
            - text: Part of the reason why websites rarely had poor FID scores was because it only measured the
            - strong [ref=e165]: input delay
            - text: portion of the user's first interaction. Because INP measurement includes the moment a visual change occurs, it's a better indicator of user experience.
          - paragraph [ref=e166]:
            - text: Websites have worse INP scores compared to FID, particularly on mobile devices. As of May 2023,
            - link "99.9% of desktop sites and 93.2% of mobile sites passed FID" [ref=e167] [cursor=pointer]:
              - /url: https://httparchive.org/reports/chrome-ux-report#cruxFastFid
            - text: ", compared to"
            - link "96.6% of desktop sites and just 64.9% of mobile sites passing INP" [ref=e168] [cursor=pointer]:
              - /url: https://httparchive.org/reports/chrome-ux-report#cruxFastInp
              - text: 96.6% of desktop sites and just
              - strong [ref=e169]: 64.9%
              - text: of mobile sites passing INP
            - text: .
          - heading "jump link How is INP measured?" [level=2] [ref=e170]:
            - link "jump link" [ref=e171] [cursor=pointer]:
              - /url: "#how-is-inp-measured"
              - text: "#"
            - text: How is INP measured?
          - paragraph [ref=e172]:
            - text: During a user's visit to a web page, INP measures the time elapsed between every click, tap, and keypress until a visual change occurs. This elapsed time represents the
            - strong [ref=e173]: interaction's latency
            - text: . When the user leaves the page, the INP score is calculated based on one of the recorded interaction latencies.
          - figure "INP only measures to the first frame after an interaction, which can be an intermediate visual state like a loading spinner." [ref=e174]:
            - link "An interaction timeline showing the latency between a click, tap, or keypress and a visual update consisting of a loading spinner." [ref=e175] [cursor=pointer]:
              - /url: /@fs/Users/nray/Development/nray.dev/src/blog/interaction-to-next-paint-inp-everything-you-need-to-know/_assets/inp-progress-indicator.svg?origWidth=207&origHeight=207&origFormat=svg
              - img "An interaction timeline showing the latency between a click, tap, or keypress and a visual update consisting of a loading spinner." [ref=e176]
            - generic [ref=e177]: INP only measures to the first frame after an interaction, which can be an intermediate visual state like a loading spinner.
          - paragraph [ref=e178]:
            - text: Most of the time, INP is equal to the page's
            - strong [ref=e179]: longest interaction latency
            - text: . There's an exception, however, when a user performs
            - strong [ref=e180]: 50 or more
            - text: interactions on a page (as can often happen with single-page applications). In this case, INP will ignore
            - strong [ref=e181]: one interaction for every 50 interactions
            - text: "in an effort to reduce random outliers. So, for example, when a user views a page:"
          - list [ref=e182]:
            - listitem [ref=e183]:
              - text: If there are
              - strong [ref=e184]: "49"
              - text: interactions, INP will be the slowest interaction
            - listitem [ref=e185]:
              - text: If there are
              - strong [ref=e186]: "50"
              - text: interactions, INP will be the second slowest interaction
            - listitem [ref=e187]:
              - text: If there are
              - strong [ref=e188]: "99"
              - text: interactions, INP will
              - emphasis [ref=e189]: still
              - text: be the second slowest interaction
            - listitem [ref=e190]:
              - text: If there are
              - strong [ref=e191]: "100"
              - text: interactions, INP will be the third slowest interaction
          - paragraph [ref=e192]:
            - text: As with other Core Web Vitals, the
            - strong [ref=e193]: 75th percentile
            - text: of
            - emphasis [ref=e194]: all
            - text: page views is reported, further reducing noise.
          - paragraph [ref=e195]:
            - text: Notably, the visual update doesn't
            - emphasis [ref=e196]: need
            - text: to be the final visual state. INP is only concerned with the time it takes to present the next frame after an interaction. The frame
            - emphasis [ref=e197]: can
            - text: be an
            - strong [ref=e198]: intermediate state
            - text: like a spinner or progress bar. As long as the interaction results in timely visual feedback that shows the user
            - emphasis [ref=e199]: something
            - text: has happened, you can get good INP scores. For the best user experience, use the
            - link "appropriate progress indicator for the situation" [ref=e200] [cursor=pointer]:
              - /url: https://www.nngroup.com/articles/progress-indicators/
            - text: .
          - heading "jump link What's a good INP score?" [level=2] [ref=e201]:
            - link "jump link" [ref=e202] [cursor=pointer]:
              - /url: "#whats-a-good-inp-score"
              - text: "#"
            - text: What's a good INP score?
          - paragraph [ref=e203]:
            - text: At the
            - strong [ref=e204]: 75th percentile
            - text: "for any given page and segmented across desktop and mobile devices:"
