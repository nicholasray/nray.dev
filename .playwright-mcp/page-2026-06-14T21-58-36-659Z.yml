          - heading "jump link PageSpeed Insights (PSI)" [level=3] [ref=e261]:
            - link "jump link" [ref=e262] [cursor=pointer]:
              - /url: "#pagespeed-insights-psi"
              - text: "#"
            - text: PageSpeed Insights (PSI)
          - paragraph [ref=e263]:
            - text: If your site has enough traffic, you may be able to use data from Google's
            - link "Chrome UX Report (CrUX)" [ref=e264] [cursor=pointer]:
              - /url: https://developer.chrome.com/docs/crux/
            - text: to get a rough idea of the interaction latency your users are experiencing. Using CrUX data can be a convenient option because it doesn't require adding any tracking script to your website. Instead, Chrome collects this data from
            - link "eligible users" [ref=e265] [cursor=pointer]:
              - /url: https://developer.chrome.com/docs/crux/methodology/#user-eligibility
            - text: and
            - link "eligible pages" [ref=e266] [cursor=pointer]:
              - /url: https://developer.chrome.com/docs/crux/methodology/#eligibility
            - text: automatically.
          - paragraph [ref=e267]:
            - text: Google's
            - link "PageSpeed Insights (PSI)" [ref=e268] [cursor=pointer]:
              - /url: https://pagespeed.web.dev/
            - text: tool is one tool that makes this data easily accessible. Enter a URL and click the
            - strong [ref=e269]: Analyze
            - text: button. Then, look at the "Discover what your real users are experiencing" section.
          - figure "A PageSpeed Insights report can show how real users are experiencing your website." [ref=e270]:
            - link "Screenshot of PageSpeed Insights report showing a passing Interaction to Next Paint under a \"Discover what your real users are experiencing\" section" [ref=e271] [cursor=pointer]:
