            - text: What is Interaction to Next Paint (INP)?
          - paragraph [ref=e116]:
            - text: INP is a metric that evaluates how quickly a page visually responds to specific user interactions. It measures the
            - strong [ref=e117]: latency
            - text: of clicks, taps, and keypresses to produce visual updates.
          - figure [ref=e118]:
            - link "Timeline measuring interaction latency beginning at a click, tap, or keypress and ending at a visual update." [ref=e119] [cursor=pointer]:
              - /url: /@fs/Users/nray/Development/nray.dev/src/blog/interaction-to-next-paint-inp-everything-you-need-to-know/_assets/interaction-to-next-paint-timeline.svg?origWidth=1007&origHeight=194&origFormat=svg
              - img "Timeline measuring interaction latency beginning at a click, tap, or keypress and ending at a visual update." [ref=e120]
          - paragraph [ref=e121]: "For example, when you:"
          - list [ref=e122]:
            - listitem [ref=e123]: Click a menu button, INP measures how long it takes for the menu to appear.
            - listitem [ref=e124]: Tap the close button of a modal, INP measures how long it takes for the modal to disappear
            - listitem [ref=e125]: Press a key into an input field, INP measures how long it takes for that character to appear in the field
          - figure "Demo showing how interaction latency \"feels\" to the user. Crank up the keypress latency to increase rage 😡" [ref=e126]:
            - generic [ref=e127]:
              - generic [ref=e128]:
