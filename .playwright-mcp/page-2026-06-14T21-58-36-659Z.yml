            - button "Copy to clipboard" [ref=e520] [cursor=pointer]
          - heading "jump link Inefficient animations" [level=3] [ref=e522]:
            - link "jump link" [ref=e523] [cursor=pointer]:
              - /url: "#inefficient-animations"
              - text: "#"
            - text: Inefficient animations
          - paragraph [ref=e524]:
            - text: When animating elements, try to only animate
            - code [ref=e525]: "`transform`"
            - text: and
            - code [ref=e526]: "`opacity`"
            - text: CSS properties so the
            - link "animation doesn't run on the main thread" [ref=e527] [cursor=pointer]:
              - /url: https://www.nray.dev/blog/using-chrome-profiler-to-fix-performance-issues/#animations-that-run-on-the-main-thread
            - text: ", which can cause an input delay."
          - heading "jump link Optimize processing time" [level=2] [ref=e528]:
            - link "jump link" [ref=e529] [cursor=pointer]:
              - /url: "#optimize-processing-time"
              - text: "#"
            - text: Optimize processing time
          - paragraph [ref=e530]: Slow event callbacks will mitigate any positive effects of an optimized input delay. Fortunately, you can make optimizations to ensure this doesn't happen.
          - figure "Processing time measures how long it takes to execute the event callbacks associated with an interaction." [ref=e531]:
            - link "Interaction timeline highlighting the processing time portion." [ref=e532] [cursor=pointer]:
              - /url: /@fs/Users/nray/Development/nray.dev/src/blog/interaction-to-next-paint-inp-everything-you-need-to-know/_assets/inp-processing-time.svg?origWidth=1146&origHeight=542&origFormat=svg
              - img "Interaction timeline highlighting the processing time portion." [ref=e533]
            - generic [ref=e534]: Processing time measures how long it takes to execute the event callbacks associated with an interaction.
          - heading "jump link Long tasks from JavaScript execution" [level=3] [ref=e535]:
            - link "jump link" [ref=e536] [cursor=pointer]:
              - /url: "#long-tasks-from-javascript-execution"
              - text: "#"
            - text: Long tasks from JavaScript execution
          - paragraph [ref=e537]: Inefficient JavaScript results in long tasks on the main thread that delay important rendering updates.
          - figure "The execution of event handlers like this click handler can cause long tasks on the main thread." [ref=e538]:
            - link "Chrome's performance profiler showing a long task from a click callback." [ref=e539] [cursor=pointer]:
              - /url: /@fs/Users/nray/Development/nray.dev/src/blog/interaction-to-next-paint-inp-everything-you-need-to-know/_assets/inp-long-task-processing-time.png?origWidth=1736&origHeight=314&origFormat=png
              - img "Chrome's performance profiler showing a long task from a click callback." [ref=e540]
            - generic [ref=e541]: The execution of event handlers like this click handler can cause long tasks on the main thread.
          - paragraph [ref=e542]: How do we solve this?
          - paragraph [ref=e543]:
            - text: First, investigate the JavaScript responsible for the long task and see if there is any low-hanging fruit. Sometimes, this will reveal
            - link "unnecessary JS that can be removed" [ref=e544] [cursor=pointer]:
              - /url: /blog/300ms-faster-reducing-wikipedias-total-blocking-time/#step-1-remove-unnecessary-javascript
              - strong [ref=e545]: unnecessary JS that can be removed
            - text: or
            - link "inefficient JS that can be optimized" [ref=e546] [cursor=pointer]:
              - /url: /blog/300ms-faster-reducing-wikipedias-total-blocking-time/#step-2-optimize-existing-javascript
              - strong [ref=e547]: inefficient JS that can be optimized
            - text: . You may also be able to move some JavaScript off the main thread with
            - link "Web Workers" [ref=e548] [cursor=pointer]:
              - /url: https://developer.mozilla.org/en-US/docs/Web/API/Web_Workers_API
            - text: ", which will free up the main thread to handle interactions."
          - paragraph [ref=e549]:
            - text: After reducing JavaScript work, the next best option is to
            - strong [ref=e550]: yield to the main thread
            - text: . Split up the work into
            - strong [ref=e551]: smaller tasks
            - text: that each take less than
            - strong [ref=e552]: 50 ms
            - text: "to execute. And prioritize the work that is user-facing. The benefits of doing this are two-fold:"
          - list [ref=e553]:
            - listitem [ref=e554]:
              - text: It allows the browser to render user-visible work as quickly as possible in the next frame, providing the user with fast visual feedback that
              - emphasis [ref=e555]: something
              - text: has happened.
            - listitem [ref=e556]:
              - text: Deferring non-essential work to another task in a
              - code [ref=e557]: "`setTimeout`"
              - text: callback allows the main thread to handle higher priority tasks like subsequent user input
              - emphasis [ref=e558]: before
              - text: the
              - code [ref=e559]: "`setTimeout`"
              - text: callback is executed. Alternatively, you could use
              - 'link "`requestIdleCallback`" [ref=e560] [cursor=pointer]':
                - /url: https://developer.mozilla.org/en-US/docs/Web/API/Window/requestIdleCallback
                - code [ref=e561]: "`requestIdleCallback`"
              - text: ", but note that it has much less"
              - link "browser support" [ref=e562] [cursor=pointer]:
                - /url: https://caniuse.com/requestidlecallback
              - text: .
          - figure [ref=e564]:
            - region [ref=e565]:
              - code [ref=e566]:
                - generic [ref=e568]: "accordion.addEventListener(\"click\", (event) => {"
                - generic [ref=e570]: // Critical user-visible work that needs to happen before next
                - generic [ref=e572]: // frame.
                - generic [ref=e574]: toggleSection(event);
                - generic [ref=e578]: // Defer less important work to the next frame in another task.
                - generic [ref=e580]: "requesetAnimationFrame(() => {"
                - generic [ref=e582]: "setTimeout(() => {"
                - generic [ref=e584]: updateAnalytics(event);
                - generic [ref=e586]: "});"
                - generic [ref=e589]: "});"
                - generic [ref=e592]: "});"
            - button "Copy to clipboard" [ref=e594] [cursor=pointer]
          - heading "jump link Layout thrashing" [level=3] [ref=e596]:
            - link "jump link" [ref=e597] [cursor=pointer]:
              - /url: "#layout-thrashing"
              - text: "#"
            - text: Layout thrashing
          - paragraph [ref=e598]:
            - strong [ref=e599]: The order of your JavaScript calls can dramatically influence how long it takes to execute
            - text: .
          - paragraph [ref=e600]:
            - text: If your JS reads
            - link "layout properties" [ref=e601] [cursor=pointer]:
              - /url: https://gist.github.com/paulirish/5d52fb081b3570c81e3a
            - text: after modifying styles, the browser needs to perform a
            - link "forced synchronous layout" [ref=e602] [cursor=pointer]:
              - /url: https://www.nray.dev/blog/using-chrome-profiler-to-fix-performance-issues/#forced-synchronous-layouts
            - text: to determine the updated layout metrics.
          - figure [ref=e604]:
            - code [ref=e606]:
              - generic [ref=e608]: // Write
              - generic [ref=e610]: section.classList.add("expanded");
              - generic [ref=e612]: // Read (causing a forced synchronous layout)
              - generic [ref=e614]: section.scrollHeight;
            - button "Copy to clipboard" [ref=e616] [cursor=pointer]
          - paragraph [ref=e618]:
            - text: This order becomes particularly expensive if you invoke multiple forced synchronous layouts before the browser presents a frame. When this happens, it's called “
            - link "layout thrashing" [ref=e619] [cursor=pointer]:
              - /url: /blog/using-chrome-profiler-to-fix-performance-issues/#layout-thrashing
            - text: "\" and can significantly increase processing time. Layout thrashing often happens when a read and write are inside a loop:"
          - figure [ref=e621]:
            - region [ref=e622]:
              - code [ref=e623]:
                - generic [ref=e625]: const sections = documet.querySelectorAll("section");
                - generic [ref=e629]: // Each iteration causes a forced synchronous layout resulting in
                - generic [ref=e631]: // layout thrashing.
                - generic [ref=e633]: "sections.forEach((element) => {"
                - generic [ref=e635]: // Write
                - generic [ref=e637]: section.classList.add("expanded");
                - generic [ref=e640]: // Read (causing a forced synchronous layout)
                - generic [ref=e642]: section.scrollHeight;
                - generic [ref=e645]: "});"
            - button "Copy to clipboard" [ref=e647] [cursor=pointer]
          - paragraph [ref=e649]:
            - text: To eliminate forced synchronous layouts and layout thrashing,
            - strong [ref=e650]: perform all reads before any writes
            - text: ":"
          - figure [ref=e652]:
            - code [ref=e654]:
              - generic [ref=e656]: const sections = documet.querySelectorAll("section");
              - generic [ref=e660]: // Perform all reads first.
              - generic [ref=e662]: "sections.forEach((element) => {"
              - generic [ref=e664]: // Read
              - generic [ref=e666]: section.scrollHeight;
              - generic [ref=e669]: "});"
              - generic [ref=e673]: // Then perform all writes.
              - generic [ref=e675]: "sections.forEach((element) => {"
              - generic [ref=e677]: // Write
              - generic [ref=e679]: section.classList.add("expanded");
              - generic [ref=e682]: "});"
            - button "Copy to clipboard" [ref=e684] [cursor=pointer]
          - heading "jump link Optimize presentation delay" [level=2] [ref=e686]:
            - link "jump link" [ref=e687] [cursor=pointer]:
              - /url: "#optimize-presentation-delay"
              - text: "#"
            - text: Optimize presentation delay
          - paragraph [ref=e688]: The last phase that can go wrong is the presentation delay portion which involves rendering and presenting the visual changes. It's also one of the most challenging phases to optimize.
          - figure "Presentation delay measures how long it takes the browser to render, paint, and composite a visual update." [ref=e689]:
            - link "Interaction timeline highlighting the presentation delay portion." [ref=e690] [cursor=pointer]:
              - /url: /@fs/Users/nray/Development/nray.dev/src/blog/interaction-to-next-paint-inp-everything-you-need-to-know/_assets/inp-presentation-delay.svg?origWidth=906&origHeight=692&origFormat=svg
              - img "Interaction timeline highlighting the presentation delay portion." [ref=e691]
            - generic [ref=e692]: Presentation delay measures how long it takes the browser to render, paint, and composite a visual update.
          - heading "jump link Large DOM size" [level=3] [ref=e693]:
            - link "jump link" [ref=e694] [cursor=pointer]:
              - /url: "#large-dom-size"
              - text: "#"
            - text: Large DOM size
          - paragraph [ref=e695]:
            - text: Significant presentation delays are often the result of large DOM trees — pages with more than
            - strong [ref=e696]: ~1,400 nodes
            - text: . The rendering work that the browser must do to produce a frame correlates with the size of the DOM.
          - paragraph [ref=e697]:
