            - code [ref=e333]: "`presentation delay`"
            - text: ":"
          - list [ref=e334]:
            - listitem [ref=e335]:
              - code [ref=e336]: "`startTime`"
              - text: ": Time in milliseconds at which the interaction occurred."
            - listitem [ref=e337]:
              - code [ref=e338]: "`processingStart`"
              - text: ": Time at which event callbacks started executing. The input delay is"
