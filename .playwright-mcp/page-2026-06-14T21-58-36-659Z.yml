              - text: .
          - paragraph [ref=e348]:
            - text: You'll want to
            - link "send this" [ref=e349] [cursor=pointer]:
              - /url: https://github.com/GoogleChrome/web-vitals#send-the-results-to-an-analytics-endpoint
            - text: and other information contained in the object to your analytics provider.
          - heading "jump link What causes slow interactions?" [level=2] [ref=e350]:
            - link "jump link" [ref=e351] [cursor=pointer]:
              - /url: "#what-causes-slow-interactions"
              - text: "#"
            - text: What causes slow interactions?
          - paragraph [ref=e352]:
            - text: The main reason for slow interactions are
            - strong [ref=e353]: long tasks
            - text: — tasks that take
            - strong [ref=e354]: 50 ms or longer
            - text: — on the browser's
            - link "main thread" [ref=e355] [cursor=pointer]:
              - /url: https://developer.mozilla.org/en-US/docs/Glossary/Main_thread
              - strong [ref=e356]: main thread
            - text: ". These tasks refer to discrete units of work carried out by the browser, including:"
          - list [ref=e357]:
            - listitem [ref=e358]:
              - strong [ref=e359]: HTML parsing
              - text: ": Converts raw HTML into a DOM tree"
            - listitem [ref=e360]:
              - strong [ref=e361]: Style and layout
              - text: ": Matches elements to selectors, calculates computed styles, determines visual geometry of elements"
            - listitem [ref=e362]:
              - strong [ref=e363]: Painting
              - text: ": Records a list of drawing instructions"
            - listitem [ref=e364]:
              - strong [ref=e365]: JavaScript
              - text: ": Makes websites interactive"
            - listitem [ref=e366]:
              - strong [ref=e367]: Garbage collection
              - text: ": Reclaims memory"
          - paragraph [ref=e368]: Any of these can be responsible for a slow task.
          - paragraph [ref=e369]:
            - text: The browser's main thread can only execute one task at a time, and that task must
            - link "run to completion" [ref=e370] [cursor=pointer]:
              - /url: https://developer.mozilla.org/en-US/docs/Web/JavaScript/Event_loop#run-to-completion
            - text: before another task can start. Devices with lower hardware capabilities, such as mobile phones with slower CPUs, are more likely to have responsiveness issues because tasks take longer to complete. That's why it's a good idea to test interactions on devices that resemble the lower-end devices used by most of your users.
          - figure "Tasks that execute 50 ms or longer are considered long tasks. They are often responsible for a high INP." [ref=e371]:
            - link "A gray task with a red highlighted portion over 50 ms." [ref=e372] [cursor=pointer]:
              - /url: /@fs/Users/nray/Development/nray.dev/src/blog/interaction-to-next-paint-inp-everything-you-need-to-know/_assets/long-task.svg?origWidth=538&origHeight=116&origFormat=svg
              - img "A gray task with a red highlighted portion over 50 ms." [ref=e373]
            - generic [ref=e374]: Tasks that execute 50 ms or longer are considered long tasks. They are often responsible for a high INP.
          - paragraph [ref=e375]:
            - strong [ref=e376]: If you have a poor INP score, long tasks on the main thread are likely the primary cause.
          - heading "jump link How to fix INP" [level=2] [ref=e377]:
            - link "jump link" [ref=e378] [cursor=pointer]:
              - /url: "#how-to-fix-inp"
              - text: "#"
            - text: How to fix INP
          - paragraph [ref=e379]:
            - text: Since INP involves
            - link "three phases" [ref=e380] [cursor=pointer]:
              - /url: "#what-can-happen-during-an-interaction"
              - strong [ref=e381]: three phases
            - text: ", each interaction has three opportunities to be slow. Let's examine some of the most common reasons why"
            - strong [ref=e382]: input delay
            - text: ","
            - strong [ref=e383]: processing time
            - text: ", and"
            - strong [ref=e384]: presentation delay
            - text: can become sluggish and what you can do about it.
          - heading "jump link Optimize Input delay" [level=2] [ref=e385]:
            - link "jump link" [ref=e386] [cursor=pointer]:
              - /url: "#optimize-input-delay"
              - text: "#"
            - text: Optimize Input delay
          - paragraph [ref=e387]: The first part of each interaction always involves a small, often unnoticeable, delay that involves converting the interaction into an event that the browser understands. Once the browser determines the events associated with an interaction, it can run any registered event callbacks — unless there is a task blocking that from happening.
          - figure "Input delay measures how long it takes the browser to begin executing event callbacks." [ref=e388]:
            - link "Interaction timeline highlighting the input delay portion." [ref=e389] [cursor=pointer]:
              - /url: /@fs/Users/nray/Development/nray.dev/src/blog/interaction-to-next-paint-inp-everything-you-need-to-know/_assets/inp-input-delay.svg?origWidth=748&origHeight=542&origFormat=svg
              - img "Interaction timeline highlighting the input delay portion." [ref=e390]
            - generic [ref=e391]: Input delay measures how long it takes the browser to begin executing event callbacks.
          - heading "jump link Long tasks during page startup" [level=3] [ref=e392]:
            - link "jump link" [ref=e393] [cursor=pointer]:
              - /url: "#long-tasks-during-page-startup"
              - text: "#"
            - text: Long tasks during page startup
          - paragraph [ref=e394]:
            - text: The main thread is often the
            - strong [ref=e395]: most congested
            - text: when a page loads and initializes. The browser parses HTML, evaluates scripts, renders, and paints during this time.
          - figure "The main thread is typically very busy during page startup, which can cause a high input delay." [ref=e396]:
            - link "Chrome's performance profiler showing many long tasks during page startup." [ref=e397] [cursor=pointer]:
              - /url: /@fs/Users/nray/Development/nray.dev/src/blog/interaction-to-next-paint-inp-everything-you-need-to-know/_assets/inp-long-tasks-startup.png?origWidth=2440&origHeight=656&origFormat=png
              - img "Chrome's performance profiler showing many long tasks during page startup." [ref=e398]
            - generic [ref=e399]: The main thread is typically very busy during page startup, which can cause a high input delay.
          - paragraph [ref=e400]: "While there can be a variety of causes for these long tasks, some common culprits include:"
          - list [ref=e401]:
            - listitem [ref=e402]:
              - text: A single
              - code [ref=e403]: "`<script>`"
              - text: tag (without the
              - code [ref=e404]: "`type=module`"
              - text: attribute) that loads a huge amount of JavaScript. Since each
              - code [ref=e405]: "`<script>`"
              - text: kicks off a task that evaluates the JavaScript once loaded, it can become problematic if the evaluation takes a long time. Instead, first try to reduce the amount of JavaScript you are loading. Then, consider having multiple script tags so that each one kicks off its own
              - emphasis [ref=e406]: smaller
              - text: task. Also, consider executing expensive logic in a
              - link "web worker" [ref=e407] [cursor=pointer]:
                - /url: https://developer.mozilla.org/en-US/docs/Web/API/Web_Workers_API
              - text: .
            - listitem [ref=e408]: JavaScript that creates or mutates large DOM trees. Pages with a lot of elements can lead to very costly rendering tasks. Instead of using JavaScript to mutate the DOM during startup, try to make your server generate the HTML needed by the page.
          - heading "jump link Rapid interactions" [level=3] [ref=e409]:
            - link "jump link" [ref=e410] [cursor=pointer]:
              - /url: "#rapid-interactions"
              - text: "#"
            - text: Rapid interactions
          - paragraph [ref=e411]: Interactions that occur rapidly, like typing into an autocomplete field, can cause a high input delay for subsequent interactions.
          - figure "Interactions that happen close together, like typing \"A\" into an input box quickly followed by \"B\", can cause interaction overlap and a high input delay." [ref=e412]:
            - link "Interaction timeline showing an \"A\" keypress followed by a \"B\" keypress resulting in an input delay from the execution of event callbacks related to the \"A\" keypress." [ref=e413] [cursor=pointer]:
              - /url: /@fs/Users/nray/Development/nray.dev/src/blog/interaction-to-next-paint-inp-everything-you-need-to-know/_assets/inp-input-delay-rapid-interactions.svg?origWidth=1070&origHeight=711&origFormat=svg
              - img "Interaction timeline showing an \"A\" keypress followed by a \"B\" keypress resulting in an input delay from the execution of event callbacks related to the \"A\" keypress." [ref=e414]
            - generic [ref=e415]: Interactions that happen close together, like typing "A" into an input box quickly followed by "B", can cause interaction overlap and a high input delay.
          - paragraph [ref=e416]: "First, try to reduce the callback's JavaScript logic as much as possible. Then, to avoid problems that can arise from the accumulation of small callbacks:"
          - list [ref=e417]:
            - listitem [ref=e418]: Debounce input handlers
            - listitem [ref=e419]:
              - text: Cancel any pending
              - code [ref=e420]: "`xhr`"
              - text: or
              - code [ref=e421]: "`fetch`"
              - text: requests
          - figure [ref=e423]:
            - region [ref=e424]:
              - code [ref=e425]:
                - generic [ref=e427]: /**
                - generic [ref=e429]: "* An example showing how to debounce input events and cancel pending"
                - generic [ref=e432]: "* fetch requests to avoid a high input delay from rapid input events."
                - generic [ref=e435]: "*/"
                - generic [ref=e438]: const input = document.querySelector("input");
                - generic [ref=e440]: let controller;
                - generic [ref=e442]: let signal;
                - generic [ref=e444]: let timeoutId;
                - generic [ref=e448]: "const handler = async (e) => {"
                - generic [ref=e450]: // Cancel any pending requests.
                - generic [ref=e452]: "if (controller) {"
                - generic [ref=e454]: controller.abort();
                - generic [ref=e457]: "}"
                - generic [ref=e462]: controller = new AbortController();
                - generic [ref=e465]: signal = controller.signal;
                - generic [ref=e470]: "try {"
