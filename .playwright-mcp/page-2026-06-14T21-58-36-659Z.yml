              - img "An expanded JSON object showing \"attribution\", \"entries\", \"id\", \"name\", \"navigationType\", \"rating\", and \"value\" top-level keys." [ref=e327]
          - paragraph [ref=e328]:
            - text: Importing the
            - code [ref=e329]: "`web-vitals/attribution`"
