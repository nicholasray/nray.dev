          - paragraph [ref=e113]: In this article, you will learn about INP and how to optimize it for your website to provide your users with smooth interactions.
          - heading "jump link What is Interaction to Next Paint (INP)?" [level=2] [ref=e114]:
            - link "jump link" [ref=e115] [cursor=pointer]:
