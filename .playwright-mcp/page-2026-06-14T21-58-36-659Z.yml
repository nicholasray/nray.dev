              - text: "#"
            - text: What interactions does INP measure?
          - paragraph [ref=e220]: "INP measures the following interactions:"
          - list [ref=e221]:
            - listitem [ref=e222]:
              - strong [ref=e223]: Mouse clicks
            - listitem [ref=e224]:
